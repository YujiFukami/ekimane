<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="hsl(210,70%,45%)"/>
  <!-- Stopwatch body -->
  <circle cx="32" cy="36" r="18" fill="none" stroke="#fff" stroke-width="4"/>
  <circle cx="32" cy="36" r="18" fill="rgba(255,255,255,0.15)"/>
  <!-- Stopwatch crown -->
  <rect x="28" y="12" width="8" height="5" rx="2" fill="#fff"/>
  <!-- Button on top -->
  <rect x="30" y="10" width="4" height="4" rx="2" fill="#fff"/>
  <!-- Clock hands -->
  <line x1="32" y1="36" x2="32" y2="22" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="36" x2="43" y2="36" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="36" r="2.5" fill="#fff"/>
</svg>
